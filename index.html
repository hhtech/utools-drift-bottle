<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>问春风</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="page">
      <div id="status-live" class="sr-only" aria-live="polite"></div>
      <div id="notice" class="notice hidden" aria-live="polite"></div>
      <div class="button-row">
        <button id="throw-open-btn" class="main-btn" type="button">丢一个</button>
        <button id="salvage-open-btn" class="main-btn" type="button">捡一个</button>
      </div>
    </div>

    <div id="overlay" class="overlay hidden">
      <div class="modal">
        <div id="modal-display" class="modal-display hidden"></div>
        <textarea id="modal-textarea" class="modal-textarea"></textarea>
        <div class="modal-button-row">
          <button id="modal-action-btn" class="modal-btn" type="button"></button>
          <button id="modal-cancel-btn" class="modal-btn hidden" type="button">取消</button>
        </div>
      </div>
    </div>

    <script src="./config.local.js"></script>
    <script src="./script.js"></script>
  </body>
</html>
